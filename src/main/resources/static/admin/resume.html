<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        try {
            const auth = JSON.parse(localStorage.getItem("pms-auth") || "{}");
            if (!auth.accessToken) {
                window.location.replace("/api/v1/admin/login.html");
            }
        } catch {
            window.location.replace("/api/v1/admin/login.html");
        }
        (function() {
            var t = localStorage.getItem("pms-theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.dataset.theme = t;
            document.documentElement.style.backgroundColor = t === "dark" ? "#000000" : "#fdfdfd";
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/api/v1/assets/css/variables.css">
    <link rel="stylesheet" href="/api/v1/assets/css/global.css">
    <link rel="stylesheet" href="/api/v1/assets/css/components.css">
    <link rel="stylesheet" href="/api/v1/assets/css/dashboard.css">
    <link rel="stylesheet" href="/api/v1/assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="/api/v1/assets/js/admin.js"></script>
</head>
<body data-page="resume" class="admin-body">
    <div class="admin-shell">
        <aside class="admin-sidebar"></aside>
        <main class="admin-main">
            <section class="admin-header">
                <div>
                    <p class="eyebrow">Resume API</p>
                    <h1>Resume management</h1>
                </div>
                <div class="admin-header-actions" style="display: flex; gap: 12px; align-items: center;">
                    <button class="button button-primary" id="add-resume-btn" type="button">
                        <i class="fa-solid fa-plus" style="margin-right: 6px;"></i>Add Resume
                    </button>
                    <button class="button button-ghost" data-logout type="button">Logout</button>
                </div>
            </section>
            <section class="panel">
                <div id="resume-metadata" class="resume-metadata-container"></div>
            </section>
        </main>
    </div>

    <!-- Resume Upload Modal -->
    <div id="resume-editor-modal" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header" style="margin-bottom: 20px;">
                <div>
                    <p class="eyebrow">Document vault</p>
                    <h2 id="resume-modal-title" style="margin: 0;">Upload new resume</h2>
                </div>
                <button id="resume-modal-close" class="modal-close" type="button" aria-label="Close upload form">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form id="resume-form" class="form-panel" novalidate></form>
        </div>
    </div>
</body>
</html>
