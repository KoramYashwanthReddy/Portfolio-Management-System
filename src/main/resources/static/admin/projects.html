<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        if (!localStorage.getItem("pms-auth") || !JSON.parse(localStorage.getItem("pms-auth")).accessToken) {
            window.location.replace("/api/v1/admin/login.html");
        }
        (function() {
            var t = localStorage.getItem("pms-theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.dataset.theme = t;
            document.documentElement.style.backgroundColor = t === "dark" ? "#000000" : "#fdfdfd";
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/api/v1/assets/css/variables.css">
    <link rel="stylesheet" href="/api/v1/assets/css/global.css">
    <link rel="stylesheet" href="/api/v1/assets/css/components.css">
    <link rel="stylesheet" href="/api/v1/assets/css/dashboard.css">
    <link rel="stylesheet" href="/api/v1/assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="/api/v1/assets/js/admin.js"></script>
</head>
<body data-page="projects" class="admin-body">
    <div class="admin-shell">
        <aside class="admin-sidebar"></aside>
        <main class="admin-main">
            <section class="admin-header">
                <div>
                    <p class="eyebrow">Projects API</p>
                    <h1>Project management</h1>
                </div>
                <div class="admin-header-actions" style="display: flex; gap: 12px; align-items: center;">
                    <button id="add-project-btn" class="button button-primary" type="button"><i class="fa-solid fa-plus" style="margin-right:6px;"></i>Add project</button>
                    <button class="button button-ghost" data-logout type="button">Logout</button>
                </div>
            </section>
            <section class="admin-grid form-layout admin-stack-layout" style="grid-template-columns: 1fr;">
                <div class="panel">
                    <div class="explorer-controls">
                        <input id="admin-project-search" class="input" type="search" placeholder="Search projects">
                        <select id="admin-project-category" class="input"></select>
                        <select id="admin-project-status" class="input"></select>
                        <select id="admin-project-visibility" class="input">
                            <option value="">All visibility</option>
                            <option value="displayed">Displayed</option>
                            <option value="hidden">Hidden</option>
                        </select>
                    </div>
                    <div id="admin-project-list" class="table-list"></div>
                    <div class="pagination-bar">
                        <button id="admin-project-prev" class="button button-ghost" type="button">Previous</button>
                        <span id="admin-project-page-label">Page 1</span>
                        <button id="admin-project-next" class="button button-ghost" type="button">Next</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="project-editor-modal" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal-content profile-modal">
            <div class="profile-modal-shell panel">
                <div class="profile-modal-header">
                    <div>
                        <p class="eyebrow" id="project-modal-kicker">Project Record</p>
                        <h2 id="project-modal-title">New project</h2>
                        <p class="form-help" id="project-modal-copy">Add or edit your project details in this overlay.</p>
                    </div>
                    <button id="project-modal-close" class="modal-close" type="button" aria-label="Close project editor">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="profile-modal-body">
                    <form id="project-form" class="panel form-panel profile-editor-panel" novalidate></form>
                </div>
            </div>
        </div>
    </div>

    <div id="project-detail-modal" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal-content project-detail-modal">
            <div class="project-detail-content">
                <div class="modal-header" style="margin-bottom: 20px;">
                    <div>
                        <p class="eyebrow">Project overview</p>
                        <h2 id="project-detail-title" style="margin: 0;">Project details</h2>
                    </div>
                    <button id="project-detail-close" class="modal-close" type="button" aria-label="Close project details">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div id="project-detail-content"></div>
            </div>
        </div>
    </div>
</body>
</html>
