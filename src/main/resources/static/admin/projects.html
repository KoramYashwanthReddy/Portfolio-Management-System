<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        if (!localStorage.getItem("pms-auth") || !JSON.parse(localStorage.getItem("pms-auth")).accessToken) {
            window.location.replace("/api/v1/admin/login.html");
        }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/api/v1/assets/css/variables.css">
    <link rel="stylesheet" href="/api/v1/assets/css/global.css">
    <link rel="stylesheet" href="/api/v1/assets/css/components.css">
    <link rel="stylesheet" href="/api/v1/assets/css/dashboard.css">
    <link rel="stylesheet" href="/api/v1/assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="/api/v1/assets/js/admin.js"></script>
</head>
<body data-page="projects" class="admin-body">
    <div class="admin-shell">
        <aside class="admin-sidebar"></aside>
        <main class="admin-main">
            <section class="admin-header">
                <div>
                    <p class="eyebrow">Projects API</p>
                    <h1>Project management</h1>
                </div>
                <button class="button button-ghost" data-logout type="button">Logout</button>
            </section>
            <section class="admin-grid form-layout">
                <form id="project-form" class="panel form-panel" novalidate></form>
                <div class="panel">
                    <div class="explorer-controls">
                        <input id="admin-project-search" class="input" type="search" placeholder="Search projects">
                        <select id="admin-project-category" class="input"></select>
                        <select id="admin-project-status" class="input"></select>
                    </div>
                    <div id="admin-project-list" class="table-list"></div>
                    <div class="pagination-bar">
                        <button id="admin-project-prev" class="button button-ghost" type="button">Previous</button>
                        <span id="admin-project-page-label">Page 1</span>
                        <button id="admin-project-next" class="button button-ghost" type="button">Next</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
