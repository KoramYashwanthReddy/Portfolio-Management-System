<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        if (!localStorage.getItem("pms-auth") || !JSON.parse(localStorage.getItem("pms-auth")).accessToken) {
            window.location.replace("/api/v1/admin/login.html");
        }
        (function() {
            var t = localStorage.getItem("pms-theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.dataset.theme = t;
            document.documentElement.style.backgroundColor = t === "dark" ? "#000000" : "#fdfdfd";
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/api/v1/assets/css/variables.css">
    <link rel="stylesheet" href="/api/v1/assets/css/global.css">
    <link rel="stylesheet" href="/api/v1/assets/css/components.css">
    <link rel="stylesheet" href="/api/v1/assets/css/dashboard.css">
    <link rel="stylesheet" href="/api/v1/assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="/api/v1/assets/js/admin.js"></script>
</head>
<body data-page="certifications" class="admin-body">
    <div class="admin-shell">
        <aside class="admin-sidebar"></aside>
        <main class="admin-main">
            <section class="admin-header">
                <div>
                    <p class="eyebrow">Certification APIs</p>
                    <h1>Certification management</h1>
                </div>
                <div class="admin-header-actions" style="display: flex; gap: 12px; align-items: center;">
                    <button id="add-cert-btn" class="button button-primary" type="button"><i class="fa-solid fa-plus" style="margin-right:6px;"></i>Add certification</button>
                    <button class="button button-ghost" data-logout type="button">Logout</button>
                </div>
            </section>
            <section class="admin-grid form-layout admin-stack-layout" style="grid-template-columns: 1fr;">
                <div class="panel">
                    <div id="admin-certification-list" class="table-list"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="certification-editor-modal" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal-content profile-modal">
            <div class="profile-modal-shell panel">
                <div class="profile-modal-header">
                    <div>
                        <p class="eyebrow" id="certification-modal-kicker">Certification Record</p>
                        <h2 id="certification-modal-title">New certification</h2>
                        <p class="form-help" id="certification-modal-copy">Manage verified credentials, validity dates and verification files.</p>
                    </div>
                    <button id="certification-modal-close" class="modal-close" type="button" aria-label="Close certification editor">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="profile-modal-body">
                    <form id="certification-form" class="panel form-panel profile-editor-panel" novalidate></form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
