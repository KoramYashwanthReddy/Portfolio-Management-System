<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        try {
            const auth = JSON.parse(localStorage.getItem("pms-auth") || "{}");
            if (!auth.accessToken) {
                window.location.replace("/api/v1/admin/login.html");
            }
        } catch {
            window.location.replace("/api/v1/admin/login.html");
        }
        (function() {
            var t = localStorage.getItem("pms-theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.dataset.theme = t;
            document.documentElement.style.backgroundColor = t === "dark" ? "#000000" : "#fdfdfd";
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Notes | Portfolio Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/api/v1/assets/css/variables.css">
    <link rel="stylesheet" href="/api/v1/assets/css/global.css">
    <link rel="stylesheet" href="/api/v1/assets/css/components.css">
    <link rel="stylesheet" href="/api/v1/assets/css/dashboard.css">
    <link rel="stylesheet" href="/api/v1/assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="/api/v1/assets/js/admin.js"></script>
</head>
<body data-page="project-notes" class="admin-body">
    <div class="admin-shell">
        <aside class="admin-sidebar"></aside>
        <main class="admin-main">
            <section class="admin-header">
                <div>
                    <p class="eyebrow">Project Notes API</p>
                    <h1>Notes archive</h1>
                </div>
                <div class="admin-header-actions" style="display: flex; gap: 12px; align-items: center;">
                    <a id="project-notes-back" class="button button-ghost" href="/api/v1/admin/projects.html"><i class="fa-solid fa-arrow-left" style="margin-right:6px;"></i>Back to projects</a>
                    <button class="button button-ghost" data-logout type="button">Logout</button>
                </div>
            </section>
            <section class="admin-grid form-layout admin-stack-layout" style="grid-template-columns: 1fr;">
                <div class="panel">
                    <div id="project-notes-page-hero"></div>
                    <div class="project-notes-page-grid">
                        <div class="panel notes-composer-panel">
                            <form id="project-notes-page-form" class="notes-form" novalidate></form>
                        </div>
                        <div class="panel notes-list-panel">
                            <div class="notes-toolbar">
                                <input id="project-notes-page-search" class="input" type="search" placeholder="Search the archive">
                                <select id="project-notes-page-type" class="input"></select>
                                <select id="project-notes-page-sort" class="input">
                                    <option value="createdAt_DESC">Newest first</option>
                                    <option value="createdAt_ASC">Oldest first</option>
                                    <option value="updatedAt_DESC">Recently edited</option>
                                    <option value="title_ASC">Title A-Z</option>
                                </select>
                                <label class="notes-toggle">
                                    <input id="project-notes-page-pinned" type="checkbox">
                                    <span>Pinned only</span>
                                </label>
                            </div>
                            <div id="project-notes-page-summary"></div>
                            <div id="project-notes-page-list" class="notes-timeline"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
