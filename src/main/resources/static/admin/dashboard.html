<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        try {
            const auth = JSON.parse(localStorage.getItem("pms-auth") || "{}");
            if (!auth.accessToken) {
                window.location.replace("/api/v1/admin/login.html");
            }
        } catch {
            window.location.replace("/api/v1/admin/login.html");
        }
        // Apply theme immediately to prevent flash
        (function() {
            var t = localStorage.getItem("pms-theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.dataset.theme = t;
            document.documentElement.style.backgroundColor = t === "dark" ? "#000000" : "#fdfdfd";
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/api/v1/assets/css/variables.css">
    <link rel="stylesheet" href="/api/v1/assets/css/global.css">
    <link rel="stylesheet" href="/api/v1/assets/css/components.css">
    <link rel="stylesheet" href="/api/v1/assets/css/dashboard.css">
    <link rel="stylesheet" href="/api/v1/assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/4.5.0/chart.umd.min.js"></script>
    <script type="module" src="/api/v1/assets/js/admin.js"></script>
</head>
<body data-page="dashboard" class="admin-body">
    <div class="admin-shell">
        <aside class="admin-sidebar"></aside>
        <main class="admin-main">
            <section class="admin-header">
                <div>
                    <p class="eyebrow">Dashboard</p>
                    <h1>System telemetry</h1>
                </div>
                <button class="button button-ghost" data-logout type="button">Logout</button>
            </section>
            <section id="dashboard-metrics" class="metric-grid"></section>
            <section class="admin-grid">
                <div class="panel">
                    <div class="panel-header"><span>Portfolio Distribution</span></div>
                    <canvas id="dashboard-chart" height="240"></canvas>
                </div>
                <div class="panel">
                    <div class="panel-header"><span>Recent Messages</span></div>
                    <div id="dashboard-messages" class="stack"></div>
                </div>
            </section>
            <section class="panel">
                <div class="panel-header"><span>Recent Projects</span></div>
                <div id="dashboard-projects" class="catalog-grid compact-grid"></div>
            </section>
        </main>
    </div>
</body>
</html>
