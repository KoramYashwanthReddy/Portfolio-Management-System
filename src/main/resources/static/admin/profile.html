<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        try {
            const auth = JSON.parse(localStorage.getItem("pms-auth") || "{}");
            if (!auth.accessToken) {
                window.location.replace("/api/v1/admin/login.html");
            }
        } catch {
            window.location.replace("/api/v1/admin/login.html");
        }
        (function() {
            var t = localStorage.getItem("pms-theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.dataset.theme = t;
            document.documentElement.style.backgroundColor = t === "dark" ? "#000000" : "#fdfdfd";
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/api/v1/assets/css/variables.css">
    <link rel="stylesheet" href="/api/v1/assets/css/global.css">
    <link rel="stylesheet" href="/api/v1/assets/css/components.css">
    <link rel="stylesheet" href="/api/v1/assets/css/dashboard.css">
    <link rel="stylesheet" href="/api/v1/assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="/api/v1/assets/js/admin.js"></script>
</head>
<body data-page="profile" class="admin-body">
    <div class="admin-shell">
        <aside class="admin-sidebar"></aside>
        <main class="admin-main">
            <section class="admin-header">
                <div>
                    <p class="eyebrow">About + Auth APIs</p>
                    <h1>Profile control</h1>
                </div>
            </section>
            <section id="profile-summary" class="panel"></section>
        </main>
    </div>

    <div id="profile-editor-modal" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal-content profile-modal">
            <div class="profile-modal-shell panel">
                <div class="profile-modal-header">
                    <div>
                        <p class="eyebrow" id="profile-modal-kicker">Profile editor</p>
                        <h2 id="profile-modal-title">Update profile</h2>
                        <p class="form-help" id="profile-modal-copy">Edit the public identity in a focused popup without leaving the control plane.</p>
                    </div>
                    <button id="profile-modal-close" class="modal-close" type="button" aria-label="Close profile editor">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="profile-modal-tabs">
                    <button id="profile-tab-btn" class="modal-toggle-btn active" type="button">Profile</button>
                    <button id="password-tab-btn" class="modal-toggle-btn" type="button">Password</button>
                </div>

                <div class="profile-modal-body">
                    <form id="about-form" class="panel form-panel profile-editor-panel" novalidate></form>
                    <form id="password-form" class="panel form-panel profile-editor-panel" novalidate></form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
